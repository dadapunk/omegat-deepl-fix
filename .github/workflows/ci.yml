name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-class:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Download OmegaT (latest)
        run: |
          JSON=$(curl -sL "https://sourceforge.net/projects/omegat/best_release.json")
          FILENAME=$(echo "$JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['platform_releases']['linux']['filename'])")
          URL="https://sourceforge.net/projects/omegat/files${FILENAME}/download"
          wget -q "$URL" -O OmegaT.tar.bz2
          tar xjf OmegaT.tar.bz2
          echo "OMEGAT_DIR=$(ls -d OmegaT_* | head -1)" >> "$GITHUB_ENV"
      - name: Compile .java
        run: |
          CP="$OMEGAT_DIR/OmegaT.jar"
          for j in "$OMEGAT_DIR"/lib/*.jar; do CP="$CP:$j"; done
          javac --release 8 -cp "$CP" -d /tmp/check-build \
            patch/org/omegat/core/machinetranslators/DeepLTranslate.java
      - name: Diff against committed .class
        run: |
          for f in /tmp/check-build/org/omegat/core/machinetranslators/DeepLTranslate*.class; do
            name=$(basename "$f")
            committed="patch/org/omegat/core/machinetranslators/$name"
            if [ ! -f "$committed" ]; then
              echo "FAIL: $name is not committed. Recompile and commit it."
              exit 1
            fi
            if ! diff "$f" "$committed"; then
              echo "FAIL: $name differs from compiled output."
              echo "Recompile DeepLTranslate.java and commit the updated .class."
              exit 1
            fi
          done
          echo "PASS: Committed .class matches compiled output."
