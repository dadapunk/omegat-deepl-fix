name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download OmegaT for testing
        run: |
          curl -sL -o /tmp/omegat.zip \
            "https://sourceforge.net/projects/omegat/files/OmegaT%20-%20Standard/OmegaT%206.0.1/OmegaT_6.0.1_Without_JRE.zip/download"
          mkdir -p /tmp/omegat
          unzip -q /tmp/omegat.zip -d /tmp/omegat
          echo "OMEGAT_DIR=/tmp/omegat/OmegaT_6.0.1_Without_JRE" >> $GITHUB_ENV

      - name: Dry run
        run: ./build.sh --dry-run --omegat-dir "$OMEGAT_DIR"

      - name: Apply patch
        run: ./build.sh --omegat-dir "$OMEGAT_DIR"

      - name: Verify patch
        run: ./verify.sh --omegat-dir "$OMEGAT_DIR"
